services:
  # Flask Backend Service
  - type: web
    name: vocalresume-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd flask_backend && pip install -r requirements.txt
    startCommand: cd flask_backend && python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: BHASHINI_USER_ID
        sync: false
      - key: BHASHINI_API_KEY
        sync: false
      - key: BHASHINI_AUTHORIZATION_VALUE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vocalresume-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
    disk:
      name: uploads
      mountPath: /opt/render/project/src/flask_backend/uploads
      sizeGB: 1

# Optional: PostgreSQL Database (comment out if using SQLite)
# databases:
#   - name: vocalresume-db
#     plan: free
#     databaseName: vocalresume
#     user: vocalresume_user

